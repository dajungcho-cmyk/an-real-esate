<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — AN Real Estate</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg:     #16160e;
      --card:   #1c1c13;
      --border: rgba(240,235,224,.1);
      --gold:   #c8a96e;
      --cream:  #f0ebe0;
      --muted:  rgba(240,235,224,.4);
      --dim:    rgba(240,235,224,.15);
      --serif:  'Nanum Myeongjo', Georgia, serif;
      --sans:   'Jost', system-ui, sans-serif;
      --err:    #c04030;
      --ok:     #4a9a60;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PIN gate ── */
    #pin-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .pin-box {
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .pin-logo {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -.02em;
      margin-bottom: .25rem;
    }
    .pin-sub {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .pin-label {
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .6rem;
      display: block;
    }
    .pin-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: var(--sans);
      font-size: 1.1rem;
      letter-spacing: .4em;
      text-align: center;
      padding: .8rem 1rem;
      border-radius: 2px;
      outline: none;
      margin-bottom: .75rem;
      transition: border-color 160ms;
    }
    .pin-input:focus { border-color: var(--gold); }
    .pin-input.pin-err { border-color: var(--err); animation: shake .3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0) }
      25%      { transform: translateX(-6px) }
      75%      { transform: translateX(6px) }
    }
    .pin-btn {
      width: 100%;
      padding: .75rem;
      background: var(--gold);
      color: var(--bg);
      font-family: var(--sans);
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 160ms;
    }
    .pin-btn:hover { background: #d4b57a; }
    .pin-error {
      font-size: .78rem;
      color: var(--err);
      margin-top: .6rem;
      min-height: 1.2em;
    }

    /* ── Admin UI ── */
    #admin-ui { display: none; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .h-logo {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .h-title {
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .h-logout {
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 160ms;
    }
    .h-logout:hover { color: var(--cream); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    .section-title {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: .4rem;
    }
    .section-sub {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Property cards ── */
    .prop-grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .prop-row {
      background: var(--card);
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      transition: background 160ms;
    }
    .prop-row:last-child { border-bottom: none; }
    .prop-row:hover { background: rgba(240,235,224,.03); }

    .prop-row-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: .85rem;
    }
    .prop-ref {
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .2rem;
    }
    .prop-name {
      font-size: .95rem;
      color: var(--cream);
      line-height: 1.35;
    }
    .prop-zone {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .15rem;
    }
    .prop-status {
      font-size: .68rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .25rem .6rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .prop-status--sale { border-color: rgba(200,169,110,.4); color: var(--gold); }
    .prop-status--rent { border-color: rgba(100,180,120,.3); color: #7ac895; }

    .prop-actions {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .visit-link-input {
      flex: 1;
      min-width: 200px;
      background: rgba(240,235,224,.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--sans);
      font-size: .72rem;
      padding: .45rem .7rem;
      border-radius: 2px;
      outline: none;
      cursor: default;
    }

    .btn-copy, .btn-wa, .btn-view {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .45rem .8rem;
      font-family: var(--sans);
      font-size: .72rem;
      font-weight: 400;
      letter-spacing: .06em;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      transition: all 160ms;
      border: 1px solid;
      flex-shrink: 0;
    }
    .btn-copy {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-copy:hover, .btn-copy--ok {
      border-color: var(--gold);
      color: var(--gold);
    }
    .btn-wa {
      background: transparent;
      border-color: rgba(74,154,96,.4);
      color: #7ac895;
    }
    .btn-wa:hover { background: rgba(74,154,96,.08); }
    .btn-view {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-view:hover { border-color: var(--border); color: var(--cream); }

    /* ── Custom visit ── */
    .custom-section {
      margin-top: 2.5rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--card);
      padding: 1.5rem;
    }
    .custom-title {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .custom-fields {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      margin-bottom: .75rem;
    }
    .custom-field {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      flex: 1;
      min-width: 160px;
    }
    .custom-label {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
    }
    .custom-input {
      background: rgba(240,235,224,.04);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: var(--sans);
      font-size: .85rem;
      padding: .5rem .7rem;
      border-radius: 2px;
      outline: none;
      transition: border-color 160ms;
    }
    .custom-input:focus { border-color: var(--gold); }
    .custom-input::placeholder { color: var(--dim); }
    .btn-gen {
      padding: .5rem 1.25rem;
      background: var(--gold);
      color: var(--bg);
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .06em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 160ms;
      align-self: flex-end;
      white-space: nowrap;
    }
    .btn-gen:hover { background: #d4b57a; }
    .custom-result {
      display: none;
      gap: .5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: .75rem;
    }
    .custom-result.is-visible { display: flex; }

    @media (max-width: 600px) {
      .prop-actions { flex-direction: column; align-items: stretch; }
      .visit-link-input { min-width: 0; }
    }
  </style>
</head>
<body>

  <!-- PIN Gate -->
  <div id="pin-gate">
    <div class="pin-box">
      <div class="pin-logo">AN</div>
      <div class="pin-sub">Acceso de administrador</div>
      <label class="pin-label" for="pin-input">Contraseña</label>
      <input class="pin-input" type="password" id="pin-input" placeholder="····" maxlength="20" autocomplete="current-password">
      <button class="pin-btn" id="pin-btn">Entrar</button>
      <p class="pin-error" id="pin-error"></p>
    </div>
  </div>

  <!-- Admin UI -->
  <div id="admin-ui">
    <header>
      <div>
        <div class="h-logo">AN</div>
        <div class="h-title">Panel de administración</div>
      </div>
      <button class="h-logout" id="btn-logout">Cerrar sesión</button>
    </header>

    <main>
      <h1 class="section-title">Hojas de visita</h1>
      <p class="section-sub">Genera y comparte el enlace de firma para cada propiedad.</p>

      <div class="prop-grid" id="prop-grid">
        <!-- populated by JS -->
      </div>

      <!-- Custom visit (for properties not in the list) -->
      <div class="custom-section">
        <p class="custom-title">Visita personalizada</p>
        <div class="custom-fields">
          <div class="custom-field">
            <label class="custom-label">Referencia</label>
            <input class="custom-input" type="text" id="c-ref" placeholder="AN-2026-XXX">
          </div>
          <div class="custom-field" style="flex:2">
            <label class="custom-label">Nombre del inmueble</label>
            <input class="custom-input" type="text" id="c-title" placeholder="Denominación del inmueble">
          </div>
          <div class="custom-field">
            <label class="custom-label">Zona</label>
            <input class="custom-input" type="text" id="c-zone" placeholder="Barcelona">
          </div>
          <button class="btn-gen" id="c-gen">Generar enlace</button>
        </div>
        <div class="custom-result" id="c-result">
          <input class="visit-link-input" style="flex:1" type="text" id="c-link" readonly>
          <button class="btn-copy" id="c-copy">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar
          </button>
          <a class="btn-wa" id="c-wa" href="#" target="_blank" rel="noopener">
            <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            WhatsApp
          </a>
        </div>
      </div>

    </main>
  </div>

  <script src="data-listings.js"></script>
  <script>
  (function () {
    var PIN     = 'AN2026'  // ← cambia esto por tu contraseña
    var SESSION = 'an_admin_ok'
    var BASE    = 'https://anrealestate.es'

    /* ── Auth ── */
    function unlock() {
      document.getElementById('pin-gate').style.display  = 'none'
      document.getElementById('admin-ui').style.display  = 'block'
      sessionStorage.setItem(SESSION, '1')
    }

    if (sessionStorage.getItem(SESSION) === '1') { unlock() }

    document.getElementById('pin-btn').addEventListener('click', tryPin)
    document.getElementById('pin-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') tryPin()
    })

    function tryPin() {
      var val = document.getElementById('pin-input').value
      if (val === PIN) {
        unlock()
      } else {
        var el = document.getElementById('pin-input')
        el.classList.add('pin-err')
        el.value = ''
        el.focus()
        document.getElementById('pin-error').textContent = 'Contraseña incorrecta.'
        setTimeout(function () { el.classList.remove('pin-err') }, 400)
      }
    }

    document.getElementById('btn-logout').addEventListener('click', function () {
      sessionStorage.removeItem(SESSION)
      location.reload()
    })

    /* ── Load listings ── */
    var listingsEl = document.getElementById('listings-data')
    if (!listingsEl) return
    var listings = []
    try { listings = JSON.parse(listingsEl.textContent).listings || [] } catch (e) { return }

    /* ── Render property rows ── */
    var grid = document.getElementById('prop-grid')

    listings.forEach(function (l) {
      var url    = visitUrl(l.ref, l.title, l.neighbourhood, l.slug)
      var waText = 'Hola, le envío el enlace para firmar la hoja de visita del inmueble ' + l.ref + ': ' + url
      var statusCls = l.status === 'rent' ? 'prop-status--rent' : 'prop-status--sale'
      var statusTxt = l.status === 'rent' ? 'Alquiler' : 'Venta'

      var row = document.createElement('div')
      row.className = 'prop-row'
      row.innerHTML =
        '<div class="prop-row-top">' +
          '<div>' +
            '<div class="prop-ref">' + escHtml(l.ref) + '</div>' +
            '<div class="prop-name">' + escHtml(l.title) + '</div>' +
            '<div class="prop-zone">' + escHtml(l.neighbourhood) + '</div>' +
          '</div>' +
          '<span class="prop-status ' + statusCls + '">' + statusTxt + '</span>' +
        '</div>' +
        '<div class="prop-actions">' +
          '<input class="visit-link-input" type="text" readonly value="' + escAttr(url) + '">' +
          '<button class="btn-copy" data-url="' + escAttr(url) + '">' +
            '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
            ' Copiar enlace' +
          '</button>' +
          '<a class="btn-wa" href="https://wa.me/?text=' + encodeURIComponent(waText) + '" target="_blank" rel="noopener">' +
            '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>' +
            ' WhatsApp' +
          '</a>' +
          '<a class="btn-view" href="' + BASE + '/property.html?slug=' + escAttr(l.slug) + '" target="_blank" rel="noopener">' +
            '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
            ' Ver propiedad' +
          '</a>' +
        '</div>'

      row.querySelectorAll('.btn-copy').forEach(function (btn) {
        btn.addEventListener('click', function () {
          copyText(btn.dataset.url, btn)
        })
      })

      grid.appendChild(row)
    })

    /* ── Custom visit generator ── */
    document.getElementById('c-gen').addEventListener('click', function () {
      var ref   = document.getElementById('c-ref').value.trim()
      var title = document.getElementById('c-title').value.trim()
      var zone  = document.getElementById('c-zone').value.trim() || 'Barcelona, España'
      if (!ref || !title) { alert('Introduce al menos la referencia y el nombre del inmueble.'); return }
      var url    = visitUrl(ref, title, zone, '')
      var waText = 'Hola, le envío el enlace para firmar la hoja de visita del inmueble ' + ref + ': ' + url
      document.getElementById('c-link').value = url
      document.getElementById('c-wa').href = 'https://wa.me/?text=' + encodeURIComponent(waText)
      document.getElementById('c-result').classList.add('is-visible')
    })

    document.getElementById('c-copy').addEventListener('click', function () {
      copyText(document.getElementById('c-link').value, document.getElementById('c-copy'))
    })

    /* ── Helpers ── */
    function visitUrl(ref, title, zone, slug) {
      return BASE + '/visit.html?ref=' + encodeURIComponent(ref) +
        '&title=' + encodeURIComponent(title) +
        '&zone='  + encodeURIComponent(zone) +
        (slug ? '&slug=' + encodeURIComponent(slug) : '')
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(function () {
        var orig = btn.innerHTML
        btn.textContent = '✓ Copiado'
        btn.classList.add('btn-copy--ok')
        setTimeout(function () { btn.innerHTML = orig; btn.classList.remove('btn-copy--ok') }, 2000)
      }).catch(function () {
        var input = document.createElement('input')
        input.value = text
        document.body.appendChild(input)
        input.select()
        document.execCommand('copy')
        document.body.removeChild(input)
      })
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
    function escAttr(s) { return String(s).replace(/"/g,'&quot;') }
  })()
  </script>

</body>
</html>
