backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "listings"
    label: "Listings"
    files:
      - file: "data/listings.json"
        label: "Property Listings"
        name: "all_listings"
        fields:
          - label: "Listings"
            name: "listings"
            widget: "list"
            summary: "{{fields.title}} — {{fields.neighbourhood}} — {{fields.price}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                hint: "e.g. Elegant Penthouse with Sea Views"

              - label: "Price"
                name: "price"
                widget: "string"
                hint: "e.g. €3,200,000 for sale or €7,700 for monthly rent"

              - label: "Neighbourhood"
                name: "neighbourhood"
                widget: "select"
                options:
                  - { label: "— Barcelona Ciudad —",             value: "" }
                  - { label: "Eixample, Barcelona",              value: "Eixample, Barcelona" }
                  - { label: "Dreta de l'Eixample, Barcelona",   value: "Dreta de l'Eixample, Barcelona" }
                  - { label: "Pedralbes, Barcelona",             value: "Pedralbes, Barcelona" }
                  - { label: "Sarrià, Barcelona",                value: "Sarrià, Barcelona" }
                  - { label: "Sant Gervasi, Barcelona",          value: "Sant Gervasi, Barcelona" }
                  - { label: "La Bonanova, Barcelona",           value: "La Bonanova, Barcelona" }
                  - { label: "Les Tres Torres, Barcelona",       value: "Les Tres Torres, Barcelona" }
                  - { label: "Gràcia, Barcelona",                value: "Gràcia, Barcelona" }
                  - { label: "Vila de Gràcia, Barcelona",        value: "Vila de Gràcia, Barcelona" }
                  - { label: "El Born, Barcelona",               value: "El Born, Barcelona" }
                  - { label: "Barri Gòtic, Barcelona",           value: "Barri Gòtic, Barcelona" }
                  - { label: "Les Corts, Barcelona",             value: "Les Corts, Barcelona" }
                  - { label: "Diagonal Mar, Barcelona",          value: "Diagonal Mar, Barcelona" }
                  - { label: "Poblenou, Barcelona",              value: "Poblenou, Barcelona" }
                  - { label: "Poble Sec, Barcelona",             value: "Poble Sec, Barcelona" }
                  - { label: "Vallvidrera, Barcelona",           value: "Vallvidrera, Barcelona" }
                  - { label: "— Área Metropolitana —",           value: "" }
                  - { label: "Sant Cugat del Vallès",            value: "Sant Cugat del Vallès" }
                  - { label: "La Floresta, Sant Cugat",          value: "La Floresta, Sant Cugat" }
                  - { label: "Esplugues de Llobregat",           value: "Esplugues de Llobregat" }
                  - { label: "Sant Just Desvern",                value: "Sant Just Desvern" }
                  - { label: "El Papiol",                        value: "El Papiol" }
                  - { label: "Alella",                           value: "Alella" }
                  - { label: "Teià",                             value: "Teià" }
                  - { label: "Cabrils",                          value: "Cabrils" }
                  - { label: "Premià de Dalt",                   value: "Premià de Dalt" }
                  - { label: "El Masnou",                        value: "El Masnou" }
                  - { label: "— Costa Garraf —",                 value: "" }
                  - { label: "Sitges",                           value: "Sitges" }
                  - { label: "Castelldefels",                    value: "Castelldefels" }
                  - { label: "Gavà Mar",                         value: "Gavà Mar" }
                  - { label: "Begues",                           value: "Begues" }
                  - { label: "— Costa Brava —",                  value: "" }
                  - { label: "Begur",                            value: "Begur" }
                  - { label: "Cadaqués",                         value: "Cadaqués" }
                  - { label: "Calella de Palafrugell",           value: "Calella de Palafrugell" }
                  - { label: "Llafranc",                         value: "Llafranc" }
                  - { label: "Tamariu",                          value: "Tamariu" }
                  - { label: "Pals",                             value: "Pals" }
                  - { label: "Peratallada",                      value: "Peratallada" }
                  - { label: "S'Agaró",                          value: "S'Agaró" }
                  - { label: "Platja d'Aro",                     value: "Platja d'Aro" }
                  - { label: "Sant Feliu de Guíxols",            value: "Sant Feliu de Guíxols" }
                  - { label: "L'Escala",                         value: "L'Escala" }
                  - { label: "Roses",                            value: "Roses" }
                  - { label: "Empuriabrava",                     value: "Empuriabrava" }
                  - { label: "— Cataluña Interior —",            value: "" }
                  - { label: "Vic",                              value: "Vic" }
                  - { label: "Cardedeu",                         value: "Cardedeu" }
                  - { label: "La Garriga",                       value: "La Garriga" }
                  - { label: "Tarragona",                        value: "Tarragona" }
                  - { label: "Cambrils",                         value: "Cambrils" }
                  - { label: "Salou",                            value: "Salou" }

              - label: "Type"
                name: "type"
                widget: "select"
                options:
                  - { label: "Penthouse", value: "penthouse" }
                  - { label: "Apartment", value: "apartment" }
                  - { label: "Villa",     value: "villa" }
                  - { label: "Townhouse", value: "townhouse" }
                  - { label: "Studio",    value: "studio" }

              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - { label: "For Sale", value: "sale" }
                  - { label: "For Rent", value: "rent" }

              - label: "Bedrooms"
                name: "beds"
                widget: "number"
                value_type: "int"
                min: 0

              - label: "Bathrooms"
                name: "baths"
                widget: "number"
                value_type: "int"
                min: 0

              - label: "Size (m²)"
                name: "size"
                widget: "string"
                hint: "e.g. 350"

              - label: "Image URL"
                name: "image"
                widget: "string"
                hint: "Paste a direct image URL"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Published"
                name: "published"
                widget: "boolean"
                default: true
                hint: "Toggle off to hide from the public site"
